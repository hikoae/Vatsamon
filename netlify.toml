# Configurazione deploy Netlify (sito collegato a questo repo GitHub).
# La app sta in app/. Build con base "/" (Netlify serve dalla radice del dominio,
# a differenza di GitHub Pages che usa /vazzamon/). publish è relativo a base.
[build]
  base = "app"
  command = "npm run build -- --base=/"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (tutte le rotte → index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
