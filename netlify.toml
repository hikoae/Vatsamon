# Configurazione deploy Netlify (sito collegato a questo repo GitHub).
# La app sta in app/. Build con base "/" (Netlify serve dalla radice del dominio,
# a differenza di GitHub Pages che usa /vatsamon/). publish è relativo a base.
[build]
  base = "app"
  command = "npm run build -- --base=/"
  publish = "dist"

[build.environment]
  # Node 22 LTS: allineato all'ambiente di test/CI (Node 20 è in deprecazione).
  NODE_VERSION = "22"

# SPA fallback (tutte le rotte → index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
